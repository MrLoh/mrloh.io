    text: |-
      Tobias was an amazing mentor and leader for me in the time I reported to him at Tandem. He's a strong decision maker and a guiding light. He excels in tackling tricky problems and developing systems for organizing information and processes for handling them. A number of improvements while I was there can be tied directly to him. He came into a struggling project and quickly identified and started straightening out both roadmap issues and team structure issues. He spearheaded an initiative to move into cross-functional teams which significantly improved our ability to accomplish our goals.
      The strongest recommendation I can give for Tobias was his care for his reports. He focused a lot on creating a strong culture and building up the engineers. He helped establish a structured career path which provides personalized guidance for all of the engineers in the department.
      Finally, Tobias gave me the highest quality annual review I've ever received. It included both broadly collected feedback and direct suggestions for improvements on my career generally, not just at Tandem. I think it really reflects his care and dedication to his team.
