  text: |-
    I’ve had the pleasure of working closely with Tobias over the past several years, and he is one of the strongest and most well-rounded engineers I’ve worked with.
    Tobias is a Staff+ level software engineer with an exceptional breadth of technical expertise. He is equally comfortable working across frontend and backend systems, with deep experience in TypeScript, backend engineering, databases, and distributed systems. Beyond his strong engineering fundamentals, he has also developed impressive expertise in machine learning, highly proficient with PyTorch, embedding models, model training, and modern ML workflows.
    What stands out most about Tobias is his drive to learn. He is a genuinely voracious learner who constantly explores new technologies, approaches, and ideas, and he rapidly turns that curiosity into practical impact. Whether diving into a new ML architecture, improving system reliability, or refining developer workflows, Tobias consistently raises the bar for the teams around him.
    He is also a natural leader. Tobias leads through both technical excellence and collaboration - mentoring others, driving thoughtful architectural discussions, and helping teams make pragmatic, high-quality engineering decisions. His experience spans backend architecture, Docker, Kubernetes, CI/CD pipelines, and building and operating high-throughput, data-intensive applications at scale.
    Any team would be fortunate to have Tobias. He brings technical depth, adaptability, leadership, and a relentless growth mindset to everything he does.
- name: Stephen Thompson
  title: Senior Applied AI/ML Engineer & Manager
  relationship: Worked together with Tobias at Orca
  date: 2026-05-22
  linkedin: https://www.linkedin.com/in/stephen-thompson-5413094
  image: stephen-t.jpeg
  quote: Tobias is one of the fastest engineers I have ever worked with. He has strong systems judgment, real machine learning depth, and clear focus on useful outcomes.
  text: |-
    I worked with Tobias at Orca, where we were both early members of the team and worked closely together across product, infrastructure, backend systems, and applied machine learning.
    Tobias is one of the fastest engineers I have ever worked with. In the same week, he might clean up our CI/CD GitHub Actions, change backend database logic, add API endpoints, and simplify math in our PyTorch layers — all without dropping quality. The amount of system surface area he could keep in his head was genuinely impressive, and sometimes a little intimidating.
    He also ramped up on machine learning very quickly. Within weeks, he was building new loss functions, debugging training issues, and contributing fixes back to SentenceTransformers. Later, he built an automated fine-tuning pipeline with turnkey hyperparameter sweeps, and developed a strong nose for what was going wrong in messy customer datasets.
    Tobias has good judgment about where machine learning is actually useful. He cared about whether a model, pipeline, or automation solved a real customer problem. That showed up in his work using AI agents to automate initial dataset intake and in how he approached customer data: careful, pragmatic, and focused on whether the work actually helped.
    I’d strongly recommend Tobias to any team looking for an unusually fast, broadly capable engineer with strong systems judgment, real machine learning depth, and a clear focus on useful outcomes.
